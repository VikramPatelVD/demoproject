name: Build, publish and deploy project to server
on: [push]

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --output backend/publish

      - name: Deploy
        uses: talunzhang/auto-web-deploy@v1.0.1
        with:
          website-name: faswinsoftware-001-site2
          server-computer-name: https://win8104.site4now.net:8172
          server-username: faswinsoftware-001
          server-password: Fasweb@2024
          source-path: backend/publish
          target-path: /cc/
