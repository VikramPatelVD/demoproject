name: Deploy React + .NET to SmarterASP.NET

on:
  push:
    branches:
      - main # Triggers the deployment when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js for React
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Match your local Node version

      # 3. Build the React App
      # (Adjust the working-directory if your React code is in a subfolder like './ClientApp')
      - name: Build React Frontend
        working-directory: ./
        run: |
          npm install
          npm run build

      # 4. Setup .NET Core
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0' # Match your ASP.NET Core version

      # 5. Publish the .NET App
      # This compiles the C# code and prepares it for IIS/SmarterASP.NET
      - name: Publish .NET Backend
        run: dotnet publish -c Release -o ./publish

      # 6. Move React Build to wwwroot (If not already handled by MSBuild)
      # This ensures IIS serves your React static files correctly.
      - name: Copy React build to wwwroot
        run: |
          mkdir -p ./publish/wwwroot
          cp -R ./dist/* ./publish/wwwroot/ # Use ./build/* if using Create React App instead of Vite

      # 7. Deploy via FTP to SmarterASP.NET
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /cc/ # IMPORTANT: Check SmarterASP.NET for your exact root folder name